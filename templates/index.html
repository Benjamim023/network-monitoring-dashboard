<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetWatch - AI Security Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        #particles-js { position: fixed; width: 100%; height: 100%; background-color: #080c14; z-index: -1; top: 0; left: 0; }
        .glass-effect { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(14px); border: 1px solid rgba(16, 185, 129, 0.15); }
        .border-danger { border: 2px solid #ef4444 !important; box-shadow: 0 0 25px rgba(239, 68, 68, 0.4); }
        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-200 font-sans">
    <div id="particles-js"></div>
    <div class="container mx-auto px-4 py-12 md:py-20">
        
        <header class="text-center mb-16 animate-fade-in">
            <h1 class="text-6xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-600 mb-4 tracking-tighter">NETWATCH</h1>
            <p class="text-emerald-500/60 text-xs font-bold tracking-[0.5em] uppercase">Auditoría 2026</p>
        </header>

        <div class="max-w-2xl mx-auto glass-effect p-2 rounded-full mb-20">
            <form action="/scan" method="get" class="flex items-center gap-2">
                <input type="text" name="target" placeholder="Ej: google.com" required class="flex-1 bg-transparent px-8 py-3 focus:outline-none text-white font-mono">
                <button type="submit" class="bg-emerald-600 hover:bg-emerald-400 text-slate-900 px-10 py-3 rounded-full font-black transition-all">SCAN</button>
            </form>
        </div>

        {% if target %}
        <div class="max-w-4xl mx-auto animate-fade-in">
            <div class="glass-effect rounded-[3rem] overflow-hidden shadow-2xl">
                <div class="p-8 border-b border-white/5 flex justify-between items-center bg-white/5">
                    <h2 class="text-xl font-bold tracking-tight">TARGET: <span class="text-emerald-400 font-mono">{{ target }}</span></h2>
                    <span class="text-[10px] font-black uppercase {{ 'text-emerald-400' if estado == 'Online' else 'text-red-400' }}">{{ estado }}</span>
                </div>
                
                <div class="p-8 md:p-12">
                    <div class="grid gap-8">
                        {% for p in puertos %}
                        <div class="flex flex-col p-6 rounded-3xl border transition-all duration-500 
                            {{ 'bg-red-500/20 border-red-500 shadow-[0_0_20px_rgba(239,68,68,0.3)]' if p.peligroso else 'bg-white/5 border-emerald-500/10' }}">
                            
                            <div class="flex justify-between items-start mb-4">
                                <div class="flex flex-col">
                                    <div class="flex items-center gap-3">
                                        <span class="font-mono text-4xl font-black {{ 'text-red-400' if p.peligroso else 'text-emerald-400' }}">{{ p.puerto }}</span>
                                        <span class="text-[10px] bg-slate-800 text-slate-400 px-3 py-1 rounded-lg uppercase font-bold tracking-widest">{{ p.servicio }}</span>
                                    </div>
                                    <span class="text-[11px] text-slate-500 font-mono mt-1 italic">Software: <span class="text-slate-300">{{ p.version }}</span></span>
                                </div>
                                <span class="text-[9px] font-black px-4 py-1.5 rounded-full uppercase {{ 'bg-red-600 text-white' if p.peligroso else 'bg-emerald-500/20 text-emerald-400' }}">
                                    {{ 'CRÍTICO' if p.peligroso else 'SEGURO' }}
                                </span>
                            </div>
                            
                            <div class="mt-4 pt-4 border-t border-white/5">
                                <p class="text-[11px] {{ 'text-red-200' if p.peligroso else 'text-slate-400' }} leading-relaxed">
                                    <span class="{{ 'text-red-400' if p.peligroso else 'text-emerald-500' }} font-bold mr-2 uppercase">Audit Log:</span> {{ p.tip }}
                                </p>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
        {% endif %}
    </div>

    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 },
                "color": { "value": "#10b981" },
                "line_linked": { "enable": true, "color": "#10b981", "opacity": 0.2 },
                "move": { "enable": true, "speed": 1.5 }
            },
            "interactivity": { "events": { "onhover": { "enable": true, "mode": "grab" } } }
        });
    </script>
</body>
</html>
